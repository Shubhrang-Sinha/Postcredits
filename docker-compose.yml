services:
  db:
    image: mysql:8.0
    container_name: postcredits-db
    environment:
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: postcredits
      MYSQL_DATABASE: postcredits
      MYSQL_USER: postcredits
      MYSQL_PASSWORD: postcredits
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: postcredits-backend
    environment:
      DATABASE_URL: mysql://postcredits:postcredits@db:3306/postcredits
      PORT: "3000"
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: